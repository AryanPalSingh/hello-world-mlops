name: CI - Train and Save the model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


jobs:
  matrix-pip:
    name: Train and Save the model
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

      steps:
        - name: Checkout code
          uses: actions/checkout@v2

        - name: Setup Python
          uses: actions/setup-python@v2
          with:
            python-version: ${{ matrix.python-version }}

        - name: Upgrade pip
          run: python -m pip install --upgrade pip

        - name: Install project dependencies
          run: pip install -r hello-world-mlops/requirements.txt

        - name: Train the model
          run: |
            python hello-world-mlops/train.py
            ls -la hello-world-mlops/artifacts

        - name: Upload artifacts
          uses: actions/upload-artifact@v2
          with:
            name: ml-artifacts${{ matrix.python-version }}-${{ github.run_id }}
            path: hello-world-mlops/artifacts

        - name: Save model
          run: |
            python hello-world-mlops/save.py